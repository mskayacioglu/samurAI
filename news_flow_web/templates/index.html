<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>samurAI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <header class="topbar">
      <h1 class="page-title">
        <span class="samur">samur</span><span class="ai">A<span class="latin-i">I</span></span>
      </h1>
    </header>
    <div class="app">
      <aside class="filter-rail card">
        <div class="rail-head">
          <p>Filters</p>
        </div>
        <section class="controls">
          <label for="language">Language</label>
          <select id="language">
            {% for key, language in languages.items() %}
            <option value="{{ key }}" {% if key == default_language %}selected{% endif %}>
              {{ language.name }}
            </option>
            {% endfor %}
          </select>

          <label for="outputLanguage">Output Language</label>
          <select id="outputLanguage">
            <option value="__source__">Original (Source Language)</option>
            {% for key, language in languages.items() %}
            <option value="{{ key }}">{{ language.name }}</option>
            {% endfor %}
          </select>

          <label for="sources">Sources</label>
          <div id="sources" class="source-checklist"></div>

          <label for="model">Model</label>
          <select id="model">
            {% for key, _ in models.items() %}
            <option value="{{ key }}" {% if key == default_model %}selected{% endif %}>
              {{ key }}
            </option>
            {% endfor %}
          </select>

          <label for="limit">Per Source</label>
          <input id="limit" type="number" value="3" min="1" max="15" />

          <label>Image</label>
          <div class="display-toggle" id="displayMode">
            <label class="switch">
              <input type="checkbox" id="showImages" checked />
              <span class="slider"></span>
            </label>
            <span class="toggle-label">Show images</span>
          </div>
          <button id="refreshBtn">Refresh Feed</button>
        </section>
        <div id="status" class="status card"></div>
      </aside>

      <main class="content">
        <div id="feed" class="feed"></div>
      </main>
    </div>

    <template id="cardTemplate">
      <article class="news-card">
        <div class="meta">
          <span class="source"></span>
          <time class="time"></time>
        </div>
        <img class="news-image" alt="News visual" loading="lazy" />
        <h2 class="title"></h2>
        <p class="summary"></p>
        <a class="source-link" target="_blank" rel="noopener noreferrer">Open Original</a>
      </article>
    </template>

    <script>
      const languageEl = document.getElementById("language");
      const sourcesEl = document.getElementById("sources");
      const outputLanguageEl = document.getElementById("outputLanguage");
      const modelEl = document.getElementById("model");
      const limitEl = document.getElementById("limit");
      const refreshBtn = document.getElementById("refreshBtn");
      const feedEl = document.getElementById("feed");
      const statusEl = document.getElementById("status");
      const cardTpl = document.getElementById("cardTemplate");
      const displayModeEl = document.getElementById("displayMode");
      const showImagesEl = document.getElementById("showImages");
      const allSources = {{ sources | tojson }};
      const allLanguages = {{ languages | tojson }};

      function applyDisplayModeInPlace() {
        const showImages = !!showImagesEl?.checked;
        feedEl.dataset.showImages = showImages ? "1" : "0";
        feedEl.querySelectorAll(".news-card").forEach((card) => {
          card.dataset.showImages = showImages ? "1" : "0";
        });
        feedEl.querySelectorAll(".news-image").forEach((img) => {
          if (!showImages) {
            img.classList.add("hidden");
          } else if (img.src) {
            img.classList.remove("hidden");
          }
        });
      }

      function getSourcesByLanguage(languageKey) {
        return Object.entries(allSources).filter(([, source]) => source.language === languageKey);
      }

      function renderSourceOptions() {
        const languageSources = getSourcesByLanguage(languageEl.value);
        sourcesEl.innerHTML = "";
        languageSources.forEach(([key, source], index) => {
          const checkedAttr = index < 5 ? "checked" : "";
          const row = document.createElement("label");
          row.className = "source-option";
          row.innerHTML = `
            <input type="checkbox" value="${key}" ${checkedAttr} />
            <span>${source.name}</span>
          `;
          sourcesEl.appendChild(row);
        });
      }

      function getSelectedSources() {
        return Array.from(sourcesEl.querySelectorAll("input[type='checkbox']:checked")).map(
          (checkbox) => checkbox.value
        );
      }

      function fmtDate(iso) {
        if (!iso) return "Unknown time";
        try {
          return new Date(iso).toLocaleString();
        } catch {
          return iso;
        }
      }

      function setStatus(text, isError = false) {
        statusEl.textContent = text;
        statusEl.className = isError ? "status card error" : "status card";
      }

      async function loadNews() {
        const showImages = !!showImagesEl?.checked;
        applyDisplayModeInPlace();
        const selectedSources = getSelectedSources();
        const outputLanguage =
          outputLanguageEl.value === "__source__" ? languageEl.value : outputLanguageEl.value;
        const params = new URLSearchParams({
          language: languageEl.value,
          output_language: outputLanguage,
          sources: selectedSources.join(","),
          model: modelEl.value,
          limit: limitEl.value,
        });
        setStatus("Loading news...");
        feedEl.innerHTML = "";

        try {
          const response = await fetch(`/api/news?${params.toString()}`);
          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.error || "Failed to load data");
          }

          const languageName = allLanguages[data.language]?.name || data.language;
          const outputLanguageName =
            allLanguages[data.output_language]?.name || data.output_language;
          setStatus(
            `Loaded ${data.count} items. Source: ${languageName} | Output: ${outputLanguageName} | Model: ${data.model} (${selectedSources.length} source(s))`
          );
          data.items.forEach((item, index) => {
            const node = cardTpl.content.cloneNode(true);
            const card = node.querySelector(".news-card");
            card.style.setProperty("--i", String(index));
            card.dataset.showImages = showImages ? "1" : "0";
            node.querySelector(".source").textContent = item.source_name;
            node.querySelector(".time").textContent = fmtDate(item.published_at);
            node.querySelector(".title").textContent = item.title;
            node.querySelector(".summary").textContent = item.summary;
            const imageEl = node.querySelector(".news-image");
            if (showImages && item.image_url) {
              imageEl.src = item.image_url;
            } else {
              imageEl.classList.add("hidden");
            }

            const link = node.querySelector(".source-link");
            link.href = item.link;
            link.textContent = "Open Source Article";
            feedEl.appendChild(node);
          });
        } catch (error) {
          setStatus(error.message, true);
        }
      }

      refreshBtn.addEventListener("click", loadNews);
      displayModeEl.addEventListener("change", () => {
        applyDisplayModeInPlace();
      });
      languageEl.addEventListener("change", () => {
        if (outputLanguageEl.value !== "__source__" && outputLanguageEl.value === languageEl.value) {
          outputLanguageEl.value = "__source__";
        }
        renderSourceOptions();
        setStatus("Filters updated. Click Refresh Feed to apply.");
      });
      outputLanguageEl.addEventListener("change", () => {
        setStatus("Filters updated. Click Refresh Feed to apply.");
      });
      modelEl.addEventListener("change", () => {
        setStatus("Filters updated. Click Refresh Feed to apply.");
      });
      limitEl.addEventListener("change", () => {
        setStatus("Filters updated. Click Refresh Feed to apply.");
      });
      sourcesEl.addEventListener("change", () => {
        setStatus("Filters updated. Click Refresh Feed to apply.");
      });
      window.addEventListener("load", () => {
        renderSourceOptions();
        loadNews();
      });
    </script>
  </body>
</html>
