<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>samurAI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <header class="topbar">
      <button id="themeToggleBtn" type="button" class="theme-toggle-btn" aria-label="Toggle theme">
        <span class="theme-icon theme-icon-moon" aria-hidden="true">☾</span>
        <span class="theme-icon theme-icon-sun" aria-hidden="true">☼</span>
      </button>
      <button
        id="columnToggleBtn"
        type="button"
        class="column-toggle-btn"
        data-cols="2"
        aria-label="Cycle columns"
      >
        <span class="column-icon icon-1" aria-hidden="true">
          <svg viewBox="0 0 24 24" role="img" focusable="false">
            <rect x="4" y="3.5" width="16" height="6.5" rx="2"></rect>
            <rect x="4" y="11.5" width="16" height="4.5" rx="2"></rect>
            <rect x="4" y="17.5" width="16" height="3" rx="1.5"></rect>
          </svg>
        </span>
        <span class="column-icon icon-2" aria-hidden="true">
          <svg viewBox="0 0 24 24" role="img" focusable="false">
            <rect x="3.5" y="3.5" width="8.5" height="7" rx="2"></rect>
            <rect x="3.5" y="11.5" width="8.5" height="9" rx="2"></rect>
            <rect x="13" y="3.5" width="7.5" height="11" rx="2"></rect>
            <rect x="13" y="15.5" width="7.5" height="5" rx="2"></rect>
          </svg>
        </span>
        <span class="column-icon icon-3" aria-hidden="true">
          <svg viewBox="0 0 24 24" role="img" focusable="false">
            <rect x="2.5" y="3.5" width="6" height="6.5" rx="1.8"></rect>
            <rect x="2.5" y="11" width="6" height="9.5" rx="1.8"></rect>
            <rect x="9.5" y="3.5" width="5" height="10" rx="1.8"></rect>
            <rect x="9.5" y="14.5" width="5" height="6" rx="1.8"></rect>
            <rect x="15.5" y="3.5" width="6" height="5" rx="1.8"></rect>
            <rect x="15.5" y="9.5" width="6" height="11" rx="1.8"></rect>
          </svg>
        </span>
      </button>
      <h1 class="page-title">
        <span class="samur">samur</span><span class="ai">A<span class="latin-i">I</span></span>
      </h1>
    </header>
    <div class="app">
      <aside class="filter-rail card">
        <button
          id="panelToggleBtn"
          type="button"
          class="panel-toggle-btn"
          aria-label="Toggle filters panel"
        >
          <span class="toggle-glyph" aria-hidden="true">
            <span class="toggle-chevron">&lt;</span>
            <span class="toggle-lines">
              <span class="line"></span>
              <span class="line"></span>
              <span class="line"></span>
            </span>
          </span>
        </button>
        <div class="rail-body">
          <div class="rail-head">
            <p>Filters</p>
          </div>
          <section class="controls">
            <label for="language">Language</label>
            <select id="language">
              {% for key, language in languages.items() %}
              <option value="{{ key }}" {% if key == default_language %}selected{% endif %}>
                {{ language.name }}
              </option>
              {% endfor %}
            </select>

            <label for="outputLanguage">Output Language</label>
            <select id="outputLanguage">
              <option value="__source__">Original (Source Language)</option>
              {% for key, language in languages.items() %}
              <option value="{{ key }}">{{ language.name }}</option>
              {% endfor %}
            </select>

            <label for="topic">News Type</label>
            <select id="topic"></select>

            <label for="region">Region</label>
            <select id="region"></select>

            <label for="country">Country</label>
            <select id="country"></select>

            <label for="sources">Sources</label>
            <div id="sources" class="source-checklist"></div>

            <label for="model">Model</label>
            <select id="model">
              {% for key, _ in models.items() %}
              <option value="{{ key }}" {% if key == default_model %}selected{% endif %}>
                {{ key }}
              </option>
              {% endfor %}
            </select>

            <div class="control-inline control-inline-number">
              <label for="limit">Per Source</label>
              <input id="limit" type="number" value="2" min="1" max="15" />
            </div>

            <div class="control-inline control-inline-toggle">
              <label for="showImages">Image</label>
              <div class="display-toggle" id="displayMode">
                <label class="switch">
                  <input type="checkbox" id="showImages" checked />
                  <span class="slider"></span>
                </label>
                <span class="toggle-label">Show images</span>
              </div>
            </div>
            <button id="refreshBtn">Refresh Feed</button>
          </section>
        </div>
      </aside>

      <main class="content">
        <div id="feed" class="feed"></div>
      </main>
    </div>
    <div id="status" class="status card"></div>

    <template id="cardTemplate">
      <article class="news-card">
        <div class="meta">
          <span class="source"></span>
          <time class="time"></time>
        </div>
        <img class="news-image" alt="News visual" loading="lazy" />
        <h2 class="title"></h2>
        <p class="summary"></p>
        <a class="source-link" target="_blank" rel="noopener noreferrer">Open Original</a>
      </article>
    </template>

    <script>
      const languageEl = document.getElementById("language");
      const sourcesEl = document.getElementById("sources");
      const outputLanguageEl = document.getElementById("outputLanguage");
      const topicEl = document.getElementById("topic");
      const regionEl = document.getElementById("region");
      const countryEl = document.getElementById("country");
      const modelEl = document.getElementById("model");
      const limitEl = document.getElementById("limit");
      const refreshBtn = document.getElementById("refreshBtn");
      const feedEl = document.getElementById("feed");
      const statusEl = document.getElementById("status");
      const cardTpl = document.getElementById("cardTemplate");
      const displayModeEl = document.getElementById("displayMode");
      const showImagesEl = document.getElementById("showImages");
      const appEl = document.querySelector(".app");
      const panelToggleBtn = document.getElementById("panelToggleBtn");
      const themeToggleBtn = document.getElementById("themeToggleBtn");
      const columnToggleBtn = document.getElementById("columnToggleBtn");
      const bodyEl = document.body;
      const allSources = {{ sources | tojson }};
      const allLanguages = {{ languages | tojson }};
      const allTopics = {{ topics | tojson }};
      const allRegions = {{ regions | tojson }};
      const allCountries = {{ countries | tojson }};
      let latestItems = [];
      let lastRenderedColumnCount = null;
      let panelHidden = false;
      let manualColumnCount = 2;
      let activeTheme = "dark";
      let isLoadingNews = false;

      function setTheme(themeName) {
        activeTheme = themeName === "light" ? "light" : "dark";
        const isLight = activeTheme === "light";
        bodyEl.classList.toggle("light-theme", isLight);
        themeToggleBtn.classList.toggle("is-light", isLight);
        themeToggleBtn.setAttribute(
          "aria-label",
          isLight ? "Switch to dark theme" : "Switch to light theme"
        );
        try {
          localStorage.setItem("samurai_theme", activeTheme);
        } catch {}
      }

      function initTheme() {
        let savedTheme = "dark";
        try {
          savedTheme = localStorage.getItem("samurai_theme") || "dark";
        } catch {}
        setTheme(savedTheme);
      }

      function applyDisplayModeInPlace() {
        const showImages = !!showImagesEl?.checked;
        feedEl.dataset.showImages = showImages ? "1" : "0";
        feedEl.querySelectorAll(".news-card").forEach((card) => {
          card.dataset.showImages = showImages ? "1" : "0";
        });
        feedEl.querySelectorAll(".news-image").forEach((img) => {
          if (!showImages) {
            img.classList.add("hidden");
          } else if (img.src) {
            img.classList.remove("hidden");
          }
        });
      }

      function normalizeFilterValue(value) {
        if (!value || value === "__all__") {
          return "";
        }
        return value;
      }

      function getFilteredSources({
        languageKey = languageEl.value,
        topicKey = topicEl.value,
        regionKey = regionEl.value,
        countryKey = countryEl.value,
      } = {}) {
        const normalizedTopic = normalizeFilterValue(topicKey);
        const normalizedRegion = normalizeFilterValue(regionKey);
        const normalizedCountry = normalizeFilterValue(countryKey);
        return Object.entries(allSources).filter(([, source]) => {
          if (source.language !== languageKey) return false;
          if (normalizedTopic && source.topic !== normalizedTopic) return false;
          if (normalizedRegion && source.region !== normalizedRegion) return false;
          if (normalizedCountry && source.country !== normalizedCountry) return false;
          return true;
        });
      }

      function renderSelectOptions(selectEl, values, labelForValue, allLabel) {
        const selectedBefore = selectEl.value;
        selectEl.innerHTML = "";
        const allOption = document.createElement("option");
        allOption.value = "__all__";
        allOption.textContent = allLabel;
        selectEl.appendChild(allOption);

        values.forEach((value) => {
          const option = document.createElement("option");
          option.value = value;
          option.textContent = labelForValue(value);
          selectEl.appendChild(option);
        });

        const canKeep =
          selectedBefore && (selectedBefore === "__all__" || values.includes(selectedBefore));
        selectEl.value = canKeep ? selectedBefore : "__all__";
      }

      function renderTopicOptions() {
        const values = Array.from(
          new Set(
            getFilteredSources({
              languageKey: languageEl.value,
              topicKey: "__all__",
              regionKey: "__all__",
              countryKey: "__all__",
            }).map(([, source]) => source.topic)
          )
        ).sort((a, b) =>
          (allTopics[a]?.name || a).localeCompare(allTopics[b]?.name || b, undefined, {
            sensitivity: "base",
          })
        );

        renderSelectOptions(
          topicEl,
          values,
          (value) => allTopics[value]?.name || value,
          "All Types"
        );
      }

      function renderRegionOptions() {
        const values = Array.from(
          new Set(
            getFilteredSources({
              languageKey: languageEl.value,
              topicKey: topicEl.value,
              regionKey: "__all__",
              countryKey: "__all__",
            }).map(([, source]) => source.region)
          )
        ).sort((a, b) =>
          (allRegions[a]?.name || a).localeCompare(allRegions[b]?.name || b, undefined, {
            sensitivity: "base",
          })
        );

        renderSelectOptions(
          regionEl,
          values,
          (value) => allRegions[value]?.name || value,
          "All Regions"
        );
      }

      function renderCountryOptions() {
        const values = Array.from(
          new Set(
            getFilteredSources({
              languageKey: languageEl.value,
              topicKey: topicEl.value,
              regionKey: regionEl.value,
              countryKey: "__all__",
            }).map(([, source]) => source.country)
          )
        ).sort((a, b) =>
          (allCountries[a]?.name || a).localeCompare(allCountries[b]?.name || b, undefined, {
            sensitivity: "base",
          })
        );

        renderSelectOptions(
          countryEl,
          values,
          (value) => allCountries[value]?.name || value,
          "All Countries"
        );
      }

      function renderSourceOptions() {
        const visibleSources = getFilteredSources();
        sourcesEl.innerHTML = "";
        visibleSources.forEach(([key, source], index) => {
          const checkedAttr = index < 5 ? "checked" : "";
          const row = document.createElement("label");
          row.className = "source-option";
          row.innerHTML = `
            <input type="checkbox" value="${key}" ${checkedAttr} />
            <span>${source.name}</span>
          `;
          sourcesEl.appendChild(row);
        });
      }

      function refreshSourceFilters() {
        renderTopicOptions();
        renderRegionOptions();
        renderCountryOptions();
        renderSourceOptions();
      }

      function getSelectedSources() {
        return Array.from(sourcesEl.querySelectorAll("input[type='checkbox']:checked")).map(
          (checkbox) => checkbox.value
        );
      }

      function fmtDate(iso) {
        if (!iso) return "Unknown time";
        try {
          return new Date(iso).toLocaleString();
        } catch {
          return iso;
        }
      }

      function setStatus(text, isError = false) {
        statusEl.textContent = text;
        statusEl.className = isError ? "status card error" : "status card";
      }

      function updatePanelToggleLabel() {
        panelToggleBtn.classList.toggle("is-collapsed", panelHidden);
        panelToggleBtn.setAttribute("aria-pressed", panelHidden ? "true" : "false");
        panelToggleBtn.setAttribute(
          "aria-label",
          panelHidden ? "Show filters panel" : "Hide filters panel"
        );
      }

      function syncLogoCenterState(options = {}) {
        const { deferIfCollapsing = false } = options;
        const shouldCenterLogo = panelHidden && !window.matchMedia("(max-width: 980px)").matches;
        if (deferIfCollapsing && shouldCenterLogo) {
          requestAnimationFrame(() => {
            if (panelHidden) {
              bodyEl.classList.add("three-col-mode");
            }
          });
          return;
        }
        bodyEl.classList.toggle("three-col-mode", shouldCenterLogo);
      }

      function updateColumnToggleLabel() {
        columnToggleBtn.dataset.cols = String(manualColumnCount);
        columnToggleBtn.setAttribute("aria-label", `Columns: ${manualColumnCount}. Click to cycle`);
      }

      function captureCardPositions() {
        const positions = new Map();
        feedEl.querySelectorAll(".news-card").forEach((card) => {
          const key = card.dataset.itemKey;
          if (key) {
            positions.set(key, card.getBoundingClientRect());
          }
        });
        return positions;
      }

      function animateCardsFromPreviousPositions(previousPositions) {
        if (!previousPositions || previousPositions.size === 0) {
          return;
        }
        feedEl.querySelectorAll(".news-card").forEach((card) => {
          const key = card.dataset.itemKey;
          if (!key || !previousPositions.has(key) || typeof card.animate !== "function") {
            return;
          }
          const from = previousPositions.get(key);
          const to = card.getBoundingClientRect();
          const deltaX = Math.round(from.left - to.left);
          const deltaY = Math.round(from.top - to.top);
          if (Math.abs(deltaX) < 1 && Math.abs(deltaY) < 1) {
            return;
          }
          card.animate(
            [
              { transform: `translate(${deltaX}px, ${deltaY}px)` },
              { transform: "translate(0, 0)" },
            ],
            {
              duration: 1050,
              easing: "cubic-bezier(0.22, 1, 0.36, 1)",
            }
          );
        });
      }

      function getFeedColumnCount() {
        if (window.matchMedia("(max-width: 980px)").matches) {
          return 1;
        }
        return manualColumnCount;
      }

      function getLoadingScheme(columnCount) {
        if (columnCount <= 1) return "list";
        if (columnCount === 2) return "dual";
        return "triple";
      }

      function clearLoadingFeedState() {
        feedEl.classList.remove("is-loading");
        delete feedEl.dataset.loadingScheme;
      }

      function createFeedColumns(columnCount) {
        feedEl.innerHTML = "";
        feedEl.style.setProperty("--feed-cols", String(columnCount));
        const columns = [];
        for (let i = 0; i < columnCount; i += 1) {
          const col = document.createElement("div");
          col.className = "feed-column";
          columns.push(col);
          feedEl.appendChild(col);
        }
        lastRenderedColumnCount = columnCount;
        return columns;
      }

      function createSkeletonCard(index, scheme, showImages) {
        const card = document.createElement("article");
        card.className = "news-card skeleton-card no-entry-animation";
        card.style.setProperty("--i", String(index));
        card.dataset.scheme = scheme;
        card.dataset.showImages = showImages ? "1" : "0";
        card.dataset.hasImage = showImages ? "1" : "0";

        const meta = document.createElement("div");
        meta.className = "meta skeleton-meta";
        const sourceChip = document.createElement("span");
        sourceChip.className = "skeleton-block skeleton-pill";
        const timeChip = document.createElement("span");
        timeChip.className = "skeleton-block skeleton-pill";
        meta.append(sourceChip, timeChip);

        const image = document.createElement("div");
        image.className = "skeleton-image skeleton-block";

        const titleGroup = document.createElement("div");
        titleGroup.className = "skeleton-title-group";
        ["skeleton-line-lg", "skeleton-line-md"].forEach((sizeClass) => {
          const line = document.createElement("span");
          line.className = `skeleton-block skeleton-line ${sizeClass}`;
          titleGroup.appendChild(line);
        });

        const summary = document.createElement("div");
        summary.className = "skeleton-summary";
        ["", "", "skeleton-line-short"].forEach((sizeClass) => {
          const line = document.createElement("span");
          line.className = `skeleton-block skeleton-line ${sizeClass}`.trim();
          summary.appendChild(line);
        });

        const cta = document.createElement("div");
        cta.className = "skeleton-block skeleton-cta";

        card.append(meta, image, titleGroup, summary, cta);
        return card;
      }

      function renderLoadingSkeleton() {
        const showImages = !!showImagesEl?.checked;
        const columnCount = getFeedColumnCount();
        const scheme = getLoadingScheme(columnCount);
        const singleColumnDesktop =
          columnCount === 1 && !window.matchMedia("(max-width: 980px)").matches;
        const skeletonCount = scheme === "list" ? 6 : scheme === "dual" ? 8 : 12;

        feedEl.classList.toggle("single-column-layout", singleColumnDesktop);
        const columns = createFeedColumns(columnCount);
        feedEl.classList.add("is-loading");
        feedEl.dataset.loadingScheme = scheme;

        for (let index = 0; index < skeletonCount; index += 1) {
          const card = createSkeletonCard(index, scheme, showImages);
          columns[index % columnCount].appendChild(card);
        }
      }

      function renderFeed(items, options = {}) {
        const { previousPositions = null, disableEntryAnimation = false } = options;
        const showImages = !!showImagesEl?.checked;
        const columnCount = getFeedColumnCount();
        const singleColumnDesktop =
          columnCount === 1 && !window.matchMedia("(max-width: 980px)").matches;
        clearLoadingFeedState();
        feedEl.classList.toggle("single-column-layout", singleColumnDesktop);
        const columns = createFeedColumns(columnCount);

        items.forEach((item, index) => {
          const node = cardTpl.content.cloneNode(true);
          const card = node.querySelector(".news-card");
          const itemKey = item.link || `${item.source_key || "source"}-${index}`;
          card.dataset.itemKey = itemKey;
          card.style.setProperty("--i", String(index));
          card.dataset.showImages = showImages ? "1" : "0";
          if (disableEntryAnimation) {
            card.classList.add("no-entry-animation");
          }
          node.querySelector(".source").textContent = item.source_name;
          node.querySelector(".time").textContent = fmtDate(item.published_at);
          node.querySelector(".title").textContent = item.title;
          node.querySelector(".summary").textContent = item.summary;
          const imageEl = node.querySelector(".news-image");
          if (showImages && item.image_url) {
            imageEl.src = item.image_url;
            card.dataset.hasImage = "1";
          } else {
            imageEl.classList.add("hidden");
            card.dataset.hasImage = "0";
          }

          const link = node.querySelector(".source-link");
          link.href = item.link;
          link.textContent = "Open Source Article";
          columns[index % columnCount].appendChild(node);
        });

        animateCardsFromPreviousPositions(previousPositions);
      }

      function setPanelHidden(nextHidden) {
        if (panelHidden === nextHidden) {
          return;
        }
        const previousPositions = captureCardPositions();
        panelHidden = nextHidden;
        appEl.classList.toggle("panel-collapsed", panelHidden);
        updatePanelToggleLabel();
        syncLogoCenterState({ deferIfCollapsing: true });

        if (isLoadingNews) {
          requestAnimationFrame(() => {
            renderLoadingSkeleton();
          });
          return;
        }

        if (latestItems.length) {
          requestAnimationFrame(() => {
            renderFeed(latestItems, {
              previousPositions,
              disableEntryAnimation: true,
            });
          });
        }
      }

      async function loadNews() {
        applyDisplayModeInPlace();
        const selectedSources = getSelectedSources();
        const outputLanguage =
          outputLanguageEl.value === "__source__" ? languageEl.value : outputLanguageEl.value;
        const params = new URLSearchParams({
          language: languageEl.value,
          output_language: outputLanguage,
          sources: selectedSources.join(","),
          topic: normalizeFilterValue(topicEl.value),
          country: normalizeFilterValue(countryEl.value),
          region: normalizeFilterValue(regionEl.value),
          model: modelEl.value,
          limit: limitEl.value,
        });
        setStatus("Loading news...");
        latestItems = [];
        isLoadingNews = true;
        renderLoadingSkeleton();

        try {
          const response = await fetch(`/api/news?${params.toString()}`);
          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.error || "Failed to load data");
          }

          const languageName = allLanguages[data.language]?.name || data.language;
          const outputLanguageName =
            allLanguages[data.output_language]?.name || data.output_language;
          setStatus(
            [
              `Loaded ${data.count} items`,
              `Source: ${languageName}`,
              `Output: ${outputLanguageName}`,
              `Model: ${data.model}`,
              `Sources: ${selectedSources.length}`,
              `Topic: ${topicEl.options[topicEl.selectedIndex]?.text || "All Types"}`,
              `Region: ${regionEl.options[regionEl.selectedIndex]?.text || "All Regions"}`,
              `Country: ${countryEl.options[countryEl.selectedIndex]?.text || "All Countries"}`,
            ].join("\n")
          );
          latestItems = data.items || [];
          isLoadingNews = false;
          renderFeed(latestItems);
        } catch (error) {
          isLoadingNews = false;
          clearLoadingFeedState();
          feedEl.innerHTML = "";
          latestItems = [];
          setStatus(error.message, true);
        }
      }

      refreshBtn.addEventListener("click", loadNews);
      panelToggleBtn.addEventListener("click", () => {
        setPanelHidden(!panelHidden);
      });
      themeToggleBtn.addEventListener("click", () => {
        setTheme(activeTheme === "light" ? "dark" : "light");
      });
      columnToggleBtn.addEventListener("click", () => {
        const previousPositions = captureCardPositions();
        manualColumnCount = manualColumnCount === 3 ? 1 : manualColumnCount + 1;
        updateColumnToggleLabel();
        if (isLoadingNews) {
          renderLoadingSkeleton();
          return;
        }
        if (latestItems.length) {
          renderFeed(latestItems, {
            previousPositions,
            disableEntryAnimation: true,
          });
        }
      });
      displayModeEl.addEventListener("change", () => {
        if (isLoadingNews) {
          renderLoadingSkeleton();
          return;
        }
        applyDisplayModeInPlace();
      });
      languageEl.addEventListener("change", () => {
        if (outputLanguageEl.value !== "__source__" && outputLanguageEl.value === languageEl.value) {
          outputLanguageEl.value = "__source__";
        }
        refreshSourceFilters();
        setStatus("Filters updated. Click Refresh Feed to apply.");
      });
      topicEl.addEventListener("change", () => {
        renderRegionOptions();
        renderCountryOptions();
        renderSourceOptions();
        setStatus("Filters updated. Click Refresh Feed to apply.");
      });
      regionEl.addEventListener("change", () => {
        renderCountryOptions();
        renderSourceOptions();
        setStatus("Filters updated. Click Refresh Feed to apply.");
      });
      countryEl.addEventListener("change", () => {
        renderSourceOptions();
        setStatus("Filters updated. Click Refresh Feed to apply.");
      });
      outputLanguageEl.addEventListener("change", () => {
        setStatus("Filters updated. Click Refresh Feed to apply.");
      });
      modelEl.addEventListener("change", () => {
        setStatus("Filters updated. Click Refresh Feed to apply.");
      });
      limitEl.addEventListener("change", () => {
        setStatus("Filters updated. Click Refresh Feed to apply.");
      });
      sourcesEl.addEventListener("change", () => {
        setStatus("Filters updated. Click Refresh Feed to apply.");
      });
      window.addEventListener("resize", () => {
        syncLogoCenterState();
        if (isLoadingNews) {
          renderLoadingSkeleton();
          return;
        }
        const columnCount = getFeedColumnCount();
        if (latestItems.length && columnCount !== lastRenderedColumnCount) {
          renderFeed(latestItems);
        }
      });
      window.addEventListener("load", () => {
        initTheme();
        updateColumnToggleLabel();
        updatePanelToggleLabel();
        syncLogoCenterState();
        refreshSourceFilters();
        loadNews();
      });
    </script>
  </body>
</html>
